services:
  - type: web
    name: soil-health-monitoring-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python model/train.py"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /health
